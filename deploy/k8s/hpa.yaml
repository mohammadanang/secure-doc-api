apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: secure-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: secure-api-deployment
  minReplicas: 3
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70 # Jika rata-rata CPU mencapai 70%, GKE akan otomatis menambah Pod